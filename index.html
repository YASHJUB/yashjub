<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يشجب - منصة خدمات البناء</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- الهيدر -->
    <div class="header">
        <div class="header-right">
            <div class="logo">يشجب ⚙️</div>
            <div class="tagline">منصة خدمات البناء والبنية التحتية</div>
        </div>
        <div class="header-left">
            <div class="user-info" id="userInfo">
                <span id="userName">👤 زائر</span>
                <button class="btn-small" onclick="goToLogin()">دخول</button>
            </div>
            <div class="user-logged" id="userLogged" style="display:none">
                <span id="userPhone">👤</span>
                <button class="btn-small btn-logout" onclick="logout()">خروج</button>
            </div>
        </div>
    </div>

    <!-- القسم الرئيسي -->
    <div class="hero">
        <h1>اطلب خدمتك الآن 🚧</h1>
        <p>خدمات فورية وجدولة مسبقة بضغطة واحدة</p>
        <button class="btn" onclick="goToLogin()">ابدأ الآن</button>
    </div>

    <!-- قسم الخدمات -->
    <div class="services">
        <h2>خدماتنا</h2>
        <div class="services-grid">

            <div class="service-card" onclick="orderService('وايت ماء')">
                <div class="service-icon">🚚</div>
                <div class="service-name">وايت ماء</div>
                <div class="service-type">فوري</div>
            </div>

            <div class="service-card" onclick="orderService('سطحة')">
                <div class="service-icon">🚛</div>
                <div class="service-name">سطحة</div>
                <div class="service-type">فوري</div>
            </div>

            <div class="service-card" onclick="orderService('بوكلين')">
                <div class="service-icon">🏗️</div>
                <div class="service-name">بوكلين</div>
                <div class="service-type">مجدول</div>
            </div>

            <div class="service-card" onclick="orderService('حاوية')">
                <div class="service-icon">📦</div>
                <div class="service-name">حاوية</div>
                <div class="service-type">مجدول</div>
            </div>

            <div class="service-card" onclick="orderService('عمالة')">
                <div class="service-icon">👷</div>
                <div class="service-name">عمالة</div>
                <div class="service-type">مجدول</div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
<!-- فوتر -->
    <div class="footer">
        جميع الحقوق محفوظة © 2026 <span>يشجب</span> — منصة خدمات البناء في السعودية
    </div></body>
</html>
